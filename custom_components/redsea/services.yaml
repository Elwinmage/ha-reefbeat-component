# Service ID
clean_message:
  fields:
    device_id:
      name: Device ID
      description: The ID of the device(s) to use.
      required: true
      selector:
        config_entry:
          integration: redsea
    msg_type:
      required: true
      description: Type of message to clean
      default: "All"
      example: "last_alert_message"
      selector:
        select:
          options:
            - "All"
            - "last_message"
            - "last_alert_message"
# Service ID
request:
  fields:
    device_id:
      name: Device ID
      description: The ID of the device(s) to use.
      required: true
      selector:
        config_entry:
          integration: redsea
    access_path:
      required: true
      description: Access pass
      default: "/"
      example: "/mode"
      selector:
        text:
    method:
      required: true
      description: HTTP method
      default: "post"
      example: "post"
      selector:
        select:
          options:
            - "post"
            - "put"
            - "delete"
            - "get"
    data:
      required: true
      description: JSON data to send to device
      example: "{'mode': 'auto'}"
      default: "{}"
      selector:
        text:

# Reset a maintenance task: stamps "now" as the new last_reset for the
# (device, task) instance and recomputes derived values (days_left, overdue).
reset_maintenance:
  fields:
    device_id:
      name: Device
      description: Target device (or sub-device, e.g. RSDOSE head, RSRUN pump).
      required: true
      selector:
        device:
          integration: redsea
    task_key:
      name: Task key
      description: >
        Stable maintenance task identifier (see maintenance.TASKS keys, e.g.
        'ato_ec_sensor', 'run_skim_venturi', 'led_lens').
      required: true
      example: "led_lens"
      selector:
        text:
