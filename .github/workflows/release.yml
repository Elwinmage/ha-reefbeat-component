name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag Version'
        required: true
        default: 'v'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Set version number from trigger's tag"
        id: update_manifest
        run: |
          yq -i -o json '.version="${{ github.event.inputs.tag}}"' \
            "${{ github.workspace }}/custom_components/redsea/manifest.json"
          git config --global user.email "moranderic31@gmail.com"
          git config --global user.name "Elwinmage"
          git commit -a -m "Update version"
          git push origin HEAD:main
          SHA=`git rev-parse HEAD`
          echo "tag_sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Create tag
        if: steps.update_manifest.outcome == 'success'
        uses: actions/github-script@v7
        id: create_tag
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ github.event.inputs.tag}}',
              sha: '${{steps.update_manifest.outputs.tag_sha}}'
            })

      # 📦 1. Étape pour compresser le dossier de l'intégration
      - name: Pack integration ZIP
        run: |
          cd ${{ github.workspace }}/custom_components
          zip -r redsea.zip redsea

      # 🚀 2. Publication avec le fichier zip attaché en Asset
      - name: Create Release with Zip Asset
        uses: ncipollo/release-action@v1
        with:
          prerelease: "false" # Passe à false pour une release stable
          tag: ${{ github.event.inputs.tag }}
          artifacts: "custom_components/redsea.zip" # 👈 On attache l'archive
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
