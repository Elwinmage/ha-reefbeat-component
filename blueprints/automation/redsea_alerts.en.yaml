# English version of redsea_alerts.fr.yaml (kept structurally identical).
#
# Version: 0.2.4
# Changelog:
#   0.2.4 - Mode anomaly detection now also covers RSDOSE/RSRUN/RSMAT/RSATO/
#           RSWAVE: these expose their mode as `sensor.*_mode` (read-only),
#           not as `select.*_mode` like RSLED. Both prefixes are now matched.
#   0.2.3 - Fix mobile_app notify slug resolution: use `device_attr(d, 'name')`
#           instead of `name_by_user`. The Companion service is frozen at
#           install time using the OS-reported device name; user renames in
#           HA do not affect the `notify.mobile_app_<slug>` service name.
#   0.2.2 - Fix TypeError when subtracting calibration datetimes: some
#           timestamps come back tz-naive from the integration. Switched
#           to as_timestamp() on both sides for tz-agnostic comparison.
#   0.2.1 - Sandbox-safe list append: replace `ns.items.append(...)` by
#           `ns.items = ns.items + [...]`. HA's Jinja sandbox forbids
#           in-place mutation of both dicts and lists.
#   0.2.0 - Notification target changed to a multi-device selector
#           (mobile_app picker). Optional `channel` input added.
#           Maintenance overdue detection (button.* with reef_role
#           starting with "maint_") and per-device exclusions.
#           Sandbox-safe dict merge (replaces dict.update()).
#   0.1.0 - Initial release.

blueprint:
  name: ReefBeat watch (redsea) — v0.2.4
  description: >
    **Version 0.2.4** — Notifications for ReefBeat devices of the `redsea`
    integration.


    Automatically monitors **all** devices of the integration
    (RSLED, RSDOSE, RSRUN, RSMAT, RSATO, RSWAVE) and their sub-devices
    (RSDOSE heads, RSRUN pumps). Adding or removing a device is picked up
    at the next cycle.


    **Monitored conditions (each can be toggled, with per-device exclusions):**


    - Abnormal mode (outside the expected mode list)

    - Calibration overdue (RSDOSE: 4 heads; RSRUN: skim + cup)

    - Alert message received

    - Low battery (RSLED, RSDOSE, RSRUN)

    - Device unreachable (all device entities `unavailable`)


    **Variables in your notification actions:** `{{ title }}`,
    `{{ message }}`, `{{ alert_type }}`, `{{ device_name }}`, `{{ model }}`.


    **Entity identification:** si l'intégration expose l'attribut
    `reef_role` (mixin `ReefRoleMixin`), it is used first — robust,
    language-independent. Otherwise, automatic fallback to entity_id suffixes
    (FR/EN).


    **Exclusion cascade:** excluding a parent device also excludes
    its sub-devices (e.g. excluding "Doser 1" also excludes its 4 heads).
  domain: automation
  source_url: https://github.com/Elwinmage/ha-reefbeat-component
  input:
    notify_section:
      name: Notification targets
      icon: mdi:bell-outline
      input:
        notify_devices:
          name: Mobile devices to notify
          description: >
            Select the device(s) that will receive notifications. Only
            phones/tablets registered through the Home Assistant Companion
            app are listed. One notification is sent per device; a unique
            tag per (device, alert type) is added so new notifications
            replace older ones instead of stacking.
          selector:
            device:
              integration: mobile_app
              multiple: true
        notify_channel:
          name: Android channel (optional)
          description: >
            Channel name passed in `data.channel`. Lets you group ReefBeat
            notifications and apply dedicated sound/priority from the HA app.
            Leave empty for the default channel. iOS ignores this field.
          default: "ReefBeat"
          selector:
            text:

    mode_section:
      name: Abnormal mode
      icon: mdi:auto-mode
      input:
        notify_mode:
          name: Enable
          default: true
          selector: {boolean: {}}
        mode_exclude:
          name: Exclude these devices
          description: No "mode" notification for these devices (and their sub-devices).
          default: []
          selector:
            device:
              integration: redsea
              multiple: true

    calibration_section:
      name: Calibration overdue
      icon: mdi:calendar-clock
      input:
        notify_calibration:
          name: Enable
          default: true
          selector: {boolean: {}}
        calibration_exclude:
          name: Exclude these devices
          default: []
          selector:
            device:
              integration: redsea
              multiple: true
        calibration_max_days:
          name: Max days since last calibration
          default: 30
          selector:
            number: {min: 1, max: 365, mode: box, unit_of_measurement: days}

    alert_message_section:
      name: Device alert message
      icon: mdi:alert
      input:
        notify_alert_message:
          name: Enable
          default: true
          selector: {boolean: {}}
        alert_message_exclude:
          name: Exclude these devices
          default: []
          selector:
            device:
              integration: redsea
              multiple: true

    battery_section:
      name: Low battery
      icon: mdi:battery-alert
      input:
        notify_battery:
          name: Enable
          default: true
          selector: {boolean: {}}
        battery_exclude:
          name: Exclude these devices
          default: []
          selector:
            device:
              integration: redsea
              multiple: true

    unavailable_section:
      name: Device unreachable
      icon: mdi:lan-disconnect
      input:
        notify_unavailable:
          name: Enable
          default: true
          selector: {boolean: {}}
        unavailable_exclude:
          name: Exclude these devices
          default: []
          selector:
            device:
              integration: redsea
              multiple: true

    maintenance_section:
      name: Maintenance overdue
      icon: mdi:wrench-clock
      input:
        notify_maintenance:
          name: Enable
          description: >
            Alert when a maintenance button has a `days_left` attribute < 0
            (due date passed). Targets every `button` entity whose
            `reef_role` starts with `maint_`.
          default: true
          selector: {boolean: {}}
        maintenance_exclude:
          name: Exclude these devices
          default: []
          selector:
            device:
              integration: redsea
              multiple: true

    mode_config_section:
      name: Accepted modes
      icon: mdi:tune
      input:
        expected_modes_common:
          name: Accepted modes (RSDOSE/RSRUN/RSMAT/RSATO/RSWAVE)
          description: Any other mode will raise an alert.
          default: [auto, "off", maintenance]
          selector:
            select:
              multiple: true
              custom_value: true
              options:
                - auto
                - "off"
                - maintenance
                - cloud
                - manual
        expected_modes_led:
          name: Accepted modes (RSLED)
          default: [auto, timer, manual]
          selector:
            select:
              multiple: true
              custom_value: true
              options:
                - auto
                - timer
                - manual
                - "off"
                - cloud

mode: single
max_exceeded: silent

trigger:
  - platform: time_pattern
    minutes: "/10"
    id: periodic
  - platform: homeassistant
    event: start
    id: startup

variables:
  expected_modes_common: !input expected_modes_common
  expected_modes_led: !input expected_modes_led
  calibration_max_days: !input calibration_max_days

  notify_devices: !input notify_devices
  notify_channel: !input notify_channel

  notify_mode: !input notify_mode
  notify_calibration: !input notify_calibration
  notify_alert_message: !input notify_alert_message
  notify_battery: !input notify_battery
  notify_unavailable: !input notify_unavailable
  notify_maintenance: !input notify_maintenance

  mode_exclude: !input mode_exclude
  calibration_exclude: !input calibration_exclude
  alert_message_exclude: !input alert_message_exclude
  battery_exclude: !input battery_exclude
  unavailable_exclude: !input unavailable_exclude
  maintenance_exclude: !input maintenance_exclude

  # Stable role tags, matched first via state_attr(e, 'reef_role').
  role_mode: mode
  role_alert_message: last_alert_message
  role_battery: battery_level
  roles_calibration:
    - last_calibration
    - skim_last_calibration
    - cup_last_calibration

  # Fallback entity_id suffixes (FR + EN slugs) when reef_role is not exposed.
  mode_suffixes:
    - _mode
  alert_message_suffixes:
    - _dernier_message_d_alarme
    - _last_alert_message
  battery_suffixes:
    - _batterie
    - _battery_level
  calibration_suffixes:
    - _derniere_calibration
    - _derniere_calibration_ecumage
    - _derniere_calibration_gobelet
    - _last_calibration
    - _skim_last_calibration
    - _cup_last_calibration

action:
  - alias: "Collect all alerts in one Jinja pass"
    variables:
      alerts: >-
        {%- macro is_excluded(d, exclude_list) -%}
          {%- set parent = device_attr(d, 'via_device_id') if d else None -%}
          {{- (d in exclude_list) or (parent and parent in exclude_list) -}}
        {%- endmacro -%}

        {%- macro role_or_suffix(e, expected_role, suffixes) -%}
          {%- set r = state_attr(e, 'reef_role') -%}
          {%- if r is not none -%}
            {{- (r == expected_role) if expected_role is string
                else (r in expected_role) -}}
          {%- else -%}
            {%- set ns = namespace(hit=false) -%}
            {%- for suf in suffixes -%}
              {%- if e.endswith(suf) -%}{%- set ns.hit = true -%}{%- endif -%}
            {%- endfor -%}
            {{- ns.hit -}}
          {%- endif -%}
        {%- endmacro -%}

        {%- set ns = namespace(items=[], dev_ents={}) -%}
        {%- set ents = integration_entities('redsea') | list -%}

        {#- Group entities by device for the unreachable check. The HA
            Jinja sandbox forbids dict.update(), so we rebuild ns.dev_ents
            from scratch on each iteration using ** dict-merge syntax
            (allowed because it produces a new dict, no mutation). -#}
        {%- for e in ents -%}
          {%- set d = device_id(e) -%}
          {%- if d -%}
            {%- set lst = ns.dev_ents.get(d, []) + [e] -%}
            {%- set ns.dev_ents = dict(ns.dev_ents, **{d: lst}) -%}
          {%- endif -%}
        {%- endfor -%}

        {#- 1) Unreachable devices: every entity unavailable. -#}
        {%- if notify_unavailable -%}
          {%- for d, dents in ns.dev_ents.items() -%}
            {%- if is_excluded(d, unavailable_exclude) | trim != 'True' -%}
              {%- set total = dents | count -%}
              {%- set unav = dents | select('is_state', 'unavailable') | list | count -%}
              {%- if total > 0 and unav == total -%}
                {%- set ns.items = ns.items + [{
                  'type': 'unreachable',
                  'device': device_attr(d, 'name_by_user') or device_attr(d, 'name') or d,
                  'model': device_attr(d, 'model') or '',
                  'message': 'Device unreachable',
                }] -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}

        {#- 2) Per-entity checks. -#}
        {%- for e in ents -%}
          {%- set s = states(e) -%}
          {%- set d = device_id(e) -%}
          {%- set dname = (d and (device_attr(d, 'name_by_user') or device_attr(d, 'name'))) or e -%}
          {%- set model = (d and device_attr(d, 'model')) or '' -%}

          {%- if s not in ['unavailable', 'unknown', 'none', 'None', '', None] -%}

            {#- Mode anomaly. RSLED exposes its mode as a `select.*_mode`
                (user-settable). All other devices (RSDOSE, RSRUN, RSMAT,
                RSATO, RSWAVE) expose it as a read-only `sensor.*_mode`.
                Match both prefixes; the role/suffix filter then keeps
                only the genuine mode entity per device. -#}
            {%- if notify_mode
                   and (e.startswith('select.') or e.startswith('sensor.'))
                   and role_or_suffix(e, role_mode, mode_suffixes) | trim == 'True'
                   and is_excluded(d, mode_exclude) | trim != 'True' -%}
              {%- set expected = expected_modes_led if model.startswith('RSLED') else expected_modes_common -%}
              {%- if s not in expected -%}
                {%- set ns.items = ns.items + [{
                  'type': 'mode',
                  'device': dname,
                  'model': model,
                  'message': 'Unexpected mode: ' ~ s,
                }] -%}
              {%- endif -%}
            {%- endif -%}

            {#- Alert message. -#}
            {%- if notify_alert_message
                   and e.startswith('sensor.')
                   and role_or_suffix(e, role_alert_message, alert_message_suffixes) | trim == 'True'
                   and is_excluded(d, alert_message_exclude) | trim != 'True' -%}
              {%- set ns.items = ns.items + [{
                'type': 'alert_message',
                'device': dname,
                'model': model,
                'message': 'Alert message: ' ~ s,
              }] -%}
            {%- endif -%}

            {#- Battery low: binary_sensor.battery, state "on" = low. -#}
            {%- if notify_battery
                   and e.startswith('binary_sensor.')
                   and s == 'on'
                   and role_or_suffix(e, role_battery, battery_suffixes) | trim == 'True'
                   and is_excluded(d, battery_exclude) | trim != 'True' -%}
              {%- set ns.items = ns.items + [{
                'type': 'battery',
                'device': dname,
                'model': model,
                'message': 'Low battery',
              }] -%}
            {%- endif -%}

            {#- Calibration overdue. -#}
            {%- if notify_calibration
                   and e.startswith('sensor.')
                   and role_or_suffix(e, roles_calibration, calibration_suffixes) | trim == 'True'
                   and is_excluded(d, calibration_exclude) | trim != 'True' -%}
              {%- set dt = as_datetime(s) -%}
              {%- if dt -%}
                {#- Use as_timestamp() on both sides: it returns a plain
                    float regardless of whether the datetime is tz-aware
                    or tz-naive, so the subtraction never raises. -#}
                {%- set days = ((as_timestamp(now()) - as_timestamp(dt)) / 86400) | int -%}
                {%- if days >= calibration_max_days -%}
                  {%- set r = state_attr(e, 'reef_role') -%}
                  {%- if r == 'skim_last_calibration' or e.endswith('_derniere_calibration_ecumage') or e.endswith('_skim_last_calibration') -%}
                    {%- set kind = 'skimmer' -%}
                  {%- elif r == 'cup_last_calibration' or e.endswith('_derniere_calibration_gobelet') or e.endswith('_cup_last_calibration') -%}
                    {%- set kind = 'cup' -%}
                  {%- else -%}
                    {%- set kind = 'head' -%}
                  {%- endif -%}
                  {%- set ns.items = ns.items + [{
                    'type': 'calibration',
                    'device': dname,
                    'model': model,
                    'message': 'Calibration (' ~ kind ~ ') overdue: ' ~ days ~ ' days',
                  }] -%}
                {%- endif -%}
              {%- endif -%}
            {%- endif -%}

            {#- Maintenance overdue: button.* with reef_role starting with "maint_"
                and a negative `days_left` attribute. The button is the single
                source of truth (see MaintenanceButtonEntity). -#}
            {%- if notify_maintenance
                   and e.startswith('button.')
                   and (state_attr(e, 'reef_role') or '').startswith('maint_')
                   and is_excluded(d, maintenance_exclude) | trim != 'True' -%}
              {%- set dl = state_attr(e, 'days_left') -%}
              {%- if dl is number and dl < 0 -%}
                {%- set ns.items = ns.items + [{
                  'type': 'maintenance',
                  'device': dname,
                  'model': model,
                  'message': "Maintenance overdue by " ~ (-dl) ~ " days: " ~ (state_attr(e, 'friendly_name') or e),
                }] -%}
              {%- endif -%}
            {%- endif -%}

          {%- endif -%}
        {%- endfor -%}

        {{ ns.items }}

  - alias: "Notify for each alert"
    if:
      - "{{ alerts | length > 0 }}"
    then:
      - repeat:
          for_each: "{{ alerts }}"
          sequence:
            - variables:
                alert_type: "{{ repeat.item.type }}"
                device_name: "{{ repeat.item.device }}"
                model: "{{ repeat.item.model }}"
                title: "ReefBeat \u2014 {{ repeat.item.device }}"
                message: "{{ repeat.item.message }}"
                # Unique tag per (device, alert_type) so notifications
                # replace each other instead of stacking.
                notif_tag: "redsea_{{ repeat.item.device }}_{{ repeat.item.type }}"
            - alias: "Dispatch to each selected mobile device"
              repeat:
                for_each: "{{ notify_devices }}"
                sequence:
                  - variables:
                      # Resolve the device_id picked in the UI into the
                      # `notify.mobile_app_<slug>` service registered by
                      # the HA Companion app.
                      #
                      # IMPORTANT: we use `name` (the device name as the
                      # OS reported it at registration time) and NOT
                      # `name_by_user` (a UI-only override). The notify
                      # service slug is frozen at install time and ignores
                      # later user-renames -- if a user renamed their
                      # "SM-S721B" device to "SM-S721B_Eric" in HA, the
                      # service is still `notify.mobile_app_sm_s721b`.
                      mobile_slug: >-
                        {{ (device_attr(repeat.item, 'name')
                            or repeat.item) | slugify }}
                  - service: "notify.mobile_app_{{ mobile_slug }}"
                    data:
                      title: "{{ title }}"
                      message: "{{ message }}"
                      data: >-
                        {{
                          {
                            'tag': notif_tag,
                            'channel': notify_channel
                          } if notify_channel else {'tag': notif_tag}
                        }}
